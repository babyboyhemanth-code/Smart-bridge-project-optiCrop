<!doctype html>
<html>
  <head>
    <title>Irrigation</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body style="background: #eef7ee">
    <div class="container mt-5">
      <div class="card shadow p-4">
        <h2 class="text-success text-center">💧 Irrigation Recommendation</h2>

        <form action="/irrigation_predict" method="POST">
          <label>Soil Moisture (%)</label>

          <input type="number" class="form-control" name="moisture" />

          <br />

          <label>Temperature</label>

          <input type="number" class="form-control" name="temperature" />

          <br />

          <label>Rainfall</label>

          <input type="number" class="form-control" name="rainfall" />

          <br />

          <button class="btn btn-success">Get Recommendation</button>
        </form>
      </div>
    </div>
  </body>
</html>
