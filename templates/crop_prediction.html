<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Crop Recommendation</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body style="background: #eef7ee">
    <div class="container mt-5">
      <div class="card shadow p-4">
        <h2 class="text-center text-success">🌱 Crop Recommendation</h2>

        <form action="/predict_crop" method="POST">
          <div class="row">
            <div class="col-md-4">
              <label>Nitrogen</label>
              <input type="number" name="N" class="form-control" required />
            </div>

            <div class="col-md-4">
              <label>Phosphorus</label>
              <input type="number" name="P" class="form-control" required />
            </div>

            <div class="col-md-4">
              <label>Potassium</label>
              <input type="number" name="K" class="form-control" required />
            </div>
          </div>

          <br />

          <div class="row">
            <div class="col-md-4">
              <label>Temperature</label>
              <input
                type="number"
                step="0.01"
                name="temperature"
                class="form-control"
                required
              />
            </div>

            <div class="col-md-4">
              <label>Humidity</label>
              <input
                type="number"
                step="0.01"
                name="humidity"
                class="form-control"
                required
              />
            </div>

            <div class="col-md-4">
              <label>pH</label>
              <input
                type="number"
                step="0.01"
                name="ph"
                class="form-control"
                required
              />
            </div>
          </div>

          <br />

          <div class="row">
            <div class="col-md-6">
              <label>Rainfall</label>
              <input
                type="number"
                step="0.01"
                name="rainfall"
                class="form-control"
                required
              />
            </div>

            <div class="col-md-6 d-grid">
              <label>&nbsp;</label>

              <button class="btn btn-success">Predict Crop</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
