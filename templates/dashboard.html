<!doctype html>

<html>
  <head>
    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-success">
      <div class="container">
        <a class="navbar-brand"> 🌱 OptiCrop Dashboard </a>

        <a href="/" class="btn btn-light"> Logout </a>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row">
        <div class="col-md-3">
          <div class="card shadow p-3 text-center">
            <h4>Crop Recommendation</h4>

            <a href="/crop" class="btn btn-success"> Open </a>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow p-3 text-center">
            <h4>Fertilizer</h4>

            <a href="/fertilizer" class="btn btn-success"> Open </a>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow p-3 text-center">
            <h4>Weather</h4>

            <a href="/weather" class="btn btn-success"> Open </a>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow p-3 text-center">
            <h4>Market Price</h4>

            <a href="/market" class="btn btn-success"> Open </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
