<!doctype html>
<html>
  <head>
    <title>Fertilizer Recommendation</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body style="background: #eef7ee">
    <div class="container mt-5">
      <div class="card p-4 shadow">
        <h2 class="text-center text-success">🧪 Fertilizer Recommendation</h2>

        <form action="/fertilizer_predict" method="POST">
          <label>Crop Name</label>

          <input type="text" name="crop" class="form-control" />

          <br />

          <label>Soil Type</label>

          <select class="form-control" name="soil">
            <option>Sandy</option>

            <option>Clay</option>

            <option>Loamy</option>

            <option>Black</option>

            <option>Red</option>
          </select>

          <br />

          <button class="btn btn-success">Recommend Fertilizer</button>
        </form>
      </div>
    </div>
  </body>
</html>
